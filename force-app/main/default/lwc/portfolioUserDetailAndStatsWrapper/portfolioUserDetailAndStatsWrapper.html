<template>
    <div class="userDetailsAndStatsWrapper">
        <lightning-layout multiple-rows>
            <lightning-layout-item size="12">
                <template if:true={recordId}>
                    <c-portfolio-user-detail record-id={recordId} 
                    object-api-name={objectApiName}
                    resume-url={resumeUrl}>
                    </c-portfolio-user-detail>
                </template>
            </lightning-layout-item>
        </lightning-layout>
        <lightning-layout multiple-rows>
            <lightning-layout-item size="12">
                <template if:true={recordId}>
                    <c-portfolio-user-stats 
                    rank={rank}
                    points={points}
                    badges={badges}
                    trails={trails}></c-portfolio-user-stats>
                </template>
            </lightning-layout-item>
        </lightning-layout>
    </div>
</template>
