<template>
    <div class="skills-wrapper slds-p-around_x-large">
        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Technical Skills</h2>
        <template for:each={techSkills} for:item="tech">
            <lightning-badge key={tech} label={tech} 
            class="slds-badge slds-m-bottom_medium"></lightning-badge>
        </template>

        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Tools and Softwares</h2>
        <template for:each={softSkills} for:item="soft">
            <lightning-badge key={soft} label={soft} 
            class="slds-badge slds-m-bottom_medium"></lightning-badge>
        </template>

        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Software Methodologies</h2>
        <template for:each={softwareToolSkills} for:item="tools">
            <lightning-badge key={tools} label={tools} 
            class="slds-badge slds-m-bottom_medium"></lightning-badge>
        </template>

        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Soft Skills</h2>
        <template for:each={softwareSkills} for:item="skills">
            <lightning-badge key={skills} label={skills} 
            class="slds-badge slds-m-bottom_medium"></lightning-badge>
        </template>
    </div>
</template>
